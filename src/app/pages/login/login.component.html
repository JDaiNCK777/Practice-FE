<div class="login-page">
  <!-- Top red header bar -->
  <div class="top-bar"></div>

  <!-- Logo -->
  <div class="logo-section">
    <svg width="140" height="100" viewBox="0 0 140 100">
      <!-- Ticket body -->
      <rect x="10" y="25" width="120" height="50" rx="6" fill="#8B0000"/>
      <circle cx="10" cy="50" r="12" fill="#f5f5f5"/>
      <circle cx="130" cy="50" r="12" fill="#f5f5f5"/>
      <!-- Gold lines (queue slip) -->
      <line x1="118" y1="30" x2="130" y2="30" stroke="#D4A017" stroke-width="3" stroke-linecap="round"/>
      <line x1="118" y1="38" x2="135" y2="38" stroke="#D4A017" stroke-width="3" stroke-linecap="round"/>
      <line x1="118" y1="46" x2="130" y2="46" stroke="#D4A017" stroke-width="3" stroke-linecap="round"/>
      <!-- Gold circle with checkmark -->
      <circle cx="65" cy="50" r="22" fill="none" stroke="#D4A017" stroke-width="3"/>
      <polyline points="54,50 62,58 76,42" stroke="#D4A017" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Arrow arc -->
      <path d="M80 32 A22 22 0 0 1 86 40" stroke="#D4A017" stroke-width="3" fill="none" stroke-linecap="round"/>
      <polygon points="86,36 90,42 84,43" fill="#D4A017"/>
    </svg>
  </div>

  <!-- Form card -->
  <div class="form-card">
    <div class="field">
      <span class="field-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </span>
      <input type="text" placeholder="Email or Student ID" [(ngModel)]="identifier" />
    </div>

    <div class="field">
      <span class="field-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </span>
      <input [type]="showPassword ? 'text' : 'password'" placeholder="Password" [(ngModel)]="password" />
      <button class="eye-btn" type="button" (click)="showPassword = !showPassword">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2">
          <path *ngIf="!showPassword" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle *ngIf="!showPassword" cx="12" cy="12" r="3"/>
          <path *ngIf="showPassword" d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
          <line *ngIf="showPassword" x1="1" y1="1" x2="23" y2="23"/>
        </svg>
      </button>
    </div>

    <p class="error-msg" *ngIf="error()">{{ error() }}</p>

    <button class="btn-primary" (click)="onLogin()" [disabled]="loading()">
      {{ loading() ? 'Logging in...' : 'Login' }}
    </button>
  </div>

  <div class="footer-links">
    <a routerLink="/signup">Create Account</a>
    <a href="#">Forgot Password?</a>
  </div>
</div>
